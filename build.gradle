plugins {
    id 'java-gradle-plugin'
    id 'maven-publish'
}

group = project.property('PLUGIN_GROUP')
version = project.property('PLUGIN_VERSION')

repositories {
    mavenLocal()   // to find locally published dependencies if needed
    mavenCentral()
}

dependencies {
    implementation 'org.ow2.asm:asm:9.5'
    implementation 'org.ow2.asm:asm-commons:9.5'
}

gradlePlugin {
    plugins {
        injectGettersPlugin {
            id = project.property('PLUGIN_ID')
            implementationClass = id + "." +project.property('PLUGIN_CLASS')
        }
    }
}
